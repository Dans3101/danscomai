# NOTE: Render's default Linux runtime does NOT support the MetaTrader5
# Python package. Deploy this bridge on:
#   - a Windows VPS (recommended), OR
#   - a Wine-based container (see Dockerfile.wine, community-supported).
#
# This render.yaml is a starting point for the Wine variant.
services:
  - type: worker
    name: mt5-bridge
    env: docker
    dockerfilePath: bridge/Dockerfile.wine
    envVars:
      - key: APP_BASE_URL
        sync: false
      - key: ACCOUNT_ID
        sync: false
      - key: BRIDGE_TOKEN
        sync: false
      - key: MT5_LOGIN
        sync: false
      - key: MT5_PASSWORD
        sync: false
      - key: MT5_SERVER
        sync: false